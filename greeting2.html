<!DOCTYPE html>
<html>
<head>
<title>Your Greeting Card 💖</title>

<style>

body{
margin:0;
font-family:Arial;
background:#ffe6f0;
text-align:center;

opacity:0;
animation:fadeIn 1s forwards;
}

@keyframes fadeIn{
to{opacity:1;}
}


h1{
margin-top:30px;
color:#ff4d88;
}

.card{
margin-top:30px;
display:flex;
justify-content: center;
align-items:center;
}

.card img{
width:60%;
border-radius:10px;
box-shadow:0 8px 20px rgba(0,0,0,0.3);
}

</style>
</head>

<body>

<h1>💖 A Special Greeting For You 💖</h1>

<div class="card">

<img src="images/greeting2.jpeg" alt="Greeting2">

</div>

</body>
</html>
