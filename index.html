<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Women's Day My Love</title>

<style>
/* Reset default margins */
* {
  box-sizing: border-box;
}

body {
  margin: 0;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  background: linear-gradient(to right, #ff7eb3, #ff758c);
  font-family: Arial, sans-serif;
  text-align: center;
  color: white;
  animation: pageEnter 0.7s ease;
  overflow: hidden; /* Prevent scroll when hearts go off-screen */
}

@keyframes pageEnter {
  from {
    opacity: 0;
    transform: translateY(30px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

.fadeOut {
  animation: pageExit 0.6s forwards;
}

@keyframes pageExit {
  from {
    opacity: 1;
  }
  to {
    opacity: 0;
    transform: translateY(-30px);
  }
}

h1 {
  font-size: clamp(1.5rem, 5vw, 2.5rem); /* Responsive font size */
  margin-bottom: 2rem;
  animation: pulse 1.5s infinite;
}

button {
  padding: clamp(0.5rem, 1vw, 1rem) clamp(1rem, 3vw, 2rem); /* Responsive padding */
  font-size: clamp(1rem, 2vw, 1.2rem);
  border: none;
  border-radius: 50px;
  background: white;
  color: #ff4d88;
  cursor: pointer;
  transition: all 0.3s ease;
}

button:hover {
  background: #ffe6f0;
}

@keyframes pulse {
  0% { transform: scale(1); }
  50% { transform: scale(1.1); }
  100% { transform: scale(1); }
}

/* Heart styles */
.heart {
  position: fixed;
  width: 15px;
  height: 15px;
  background: #ffb6c1;
  transform: rotate(45deg);
}

.heart::before,
.heart::after {
  content: "";
  position: absolute;
  width: 15px;
  height: 15px;
  background: #ffb6c1;
  border-radius: 50%;
}

.heart::before {
  top: -10px;
  left: 0;
}

.heart::after {
  left: -10px;
  top: 0;
}

.fade-out {
  animation: fadeOut 0.8s forwards;
}

@keyframes fadeOut {
  0% { opacity: 1; }
  100% { opacity: 0; transform: scale(1.1); }
}

/* Media queries for smaller screens */
@media (max-width: 480px) {
  h1 {
    margin-bottom: 1.5rem;
  }

  button {
    padding: 0.5rem 1rem;
    font-size: 1rem;
  }

  .heart {
    width: 12px;
    height: 12px;
  }

  .heart::before,
  .heart::after {
    width: 12px;
    height: 12px;
  }
}
</style>
</head>

<body>

<h1>Happy Women's Day My Love ❤️</h1>
<button onclick="goPage('page2.html')">Click for Surprise 💖</button>

<script>
setInterval(() => {
  let heart = document.createElement("div");
  heart.className = "heart";

  // Random horizontal position
  heart.style.left = Math.random() * 100 + "vw";
  heart.style.top = "-20px";

  document.body.appendChild(heart);

  // Animate falling
  setTimeout(() => {
    heart.style.transition = "top 4s linear";
    heart.style.top = "100vh";
  }, 50);

  // Remove heart after animation
  setTimeout(() => {
    heart.remove();
  }, 4000);
}, 600);

function goPage(page) {
  document.body.classList.add("fadeOut");
  setTimeout(() => {
    window.location.href = page;
  }, 600);
}
</script>

</body>
</html>
