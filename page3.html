<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Greeting ❤️</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #ff7eb3;
  text-align: center;
  color: white;
}

h1 {
  margin-top: 2rem;
  font-size: clamp(1.5rem, 5vw, 2.5rem); /* Responsive font */
  padding: 0 1rem;
}

/* Gallery */
.gallery {
  display: flex;
  justify-content: center;
  gap: clamp(1rem, 5vw, 3rem); /* Responsive gap */
  margin-top: clamp(2rem, 5vw, 5rem);
  flex-wrap: wrap;
}

.card {
  width: clamp(180px, 20vw, 250px); /* Responsive width */
  height: clamp(250px, 28vw, 350px); /* Responsive height */
  perspective: 1000px;
  cursor: pointer;
}

.card-inner {
  width: 100%;
  height: 100%;
  position: relative;
  transition: transform 0.8s;
  transform-style: preserve-3d;
}

.flip {
  transform: rotateY(180deg);
}

.card-front,
.card-back {
  position: absolute;
  width: 100%;
  height: 100%;
  backface-visibility: hidden;
  border-radius: 15px;
  box-shadow: 0 8px 20px rgba(0,0,0,0.3);
}

.card-front img,
.card-back img {
  width: 100%;
  height: 100%;
  border-radius: 15px;
  object-fit: cover;
}

.card-back {
  transform: rotateY(180deg);
}

/* Full screen greeting overlay */
.overlay {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  display: none;
  align-items: center;      /* vertical centering */
  justify-content: center;  /* horizontal centering */
  background: rgba(0,0,0,0.7); /* Slight dark overlay */
  z-index: 1000;
  padding: 0;              /* remove padding to center properly */
}

.overlay img {
  max-width: 90vw;   /* responsive width */
  max-height: 80vh;  /* responsive height */
  border-radius: 20px;
  box-shadow: 0 10px 40px rgba(0,0,0,0.5);
  animation: popup 0.4s ease;
  object-fit: contain; 
  display: block;     /* ensures no inline spacing issues */
  margin: 0 auto;     /* horizontal center */
}

@keyframes popup {
  from { transform: scale(0.7); }
  to { transform: scale(1); }
}

/* Responsive adjustments for mobile */
@media (max-width: 480px) {
  .gallery {
    gap: 1rem;
  }
  .card {
    width: 45vw;
    height: 60vw;
  }
  h1 {
    font-size: 1.5rem;
  }
  .overlay img {
    max-width: 95vw;
    max-height: 75vh;
  }
}

</style>

<script>
function openCard(card, img) {
  let inner = card.querySelector(".card-inner");
  inner.classList.add("flip");

  let overlay = document.getElementById("overlay");
  let greeting = document.getElementById("greetingImg");

  greeting.src = img;
  overlay.style.display = "flex";
}

function closeGreeting() {
  let overlay = document.getElementById("overlay");
  overlay.style.display = "none";

  document.querySelectorAll(".card-inner").forEach(c => {
    c.classList.remove("flip");
  });
}
</script>

</head>
<body>

<h1>Greeting Cards for You My Love 💌</h1>

<div class="gallery">
  <div class="card" onclick="openCard(this,'images/greeting1.jpeg')">
    <div class="card-inner">
      <div class="card-front">
        <img src="images/image1.jpeg">
      </div>
      <div class="card-back">

    </div>
    </div>
  </div>

  <div class="card" onclick="openCard(this,'images/greeting2.jpeg')">
    <div class="card-inner">
      <div class="card-front">
        <img src="images/image2.jpeg">
      </div>
      <div class="card-back">

      </div>
    </div>
  </div>
</div>

<!-- Full Screen Greeting -->
<div class="overlay" id="overlay" onclick="closeGreeting()">
  <img id="greetingImg">
</div>

</body>
</html>
