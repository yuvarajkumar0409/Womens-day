<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For You ❤️</title>

<style>
/* Reset box-sizing */
* {
  box-sizing: border-box;
}

body {
  margin: 0;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  background: linear-gradient(to right, #ff758c, #ff7eb3);
  font-family: Arial, sans-serif;
  color: white;
  text-align: center;
  animation: pageEnter 0.7s ease;
  padding: 1rem;
  overflow-x: hidden;
}

@keyframes pageEnter {
  0% {
    opacity: 0;
    transform: translateY(40px) scale(0.95);
  }
  100% {
    opacity: 1;
    transform: translateY(0) scale(1);
  }
}

.fadeOut {
  animation: pageExit 0.6s forwards;
}

@keyframes pageExit {
  0% {
    opacity: 1;
  }
  100% {
    opacity: 0;
    transform: translateY(-40px) scale(1.05);
  }
}

h1 {
  font-size: clamp(1.8rem, 6vw, 2.5rem); /* Responsive font */
  margin-bottom: 1.5rem;
}

#message {
  font-size: clamp(1rem, 2.5vw, 1.25rem); /* Responsive text */
  width: clamp(80%, 60vw, 600px);        /* Responsive width */
  min-height: 80px;
  line-height: 1.5;
  margin-bottom: 1.5rem;
}

button {
  padding: clamp(0.5rem, 1vw, 0.8rem) clamp(1rem, 3vw, 2rem);
  font-size: clamp(1rem, 2vw, 1.2rem);
  border: none;
  border-radius: 50px;
  background: white;
  color: #ff4d88;
  cursor: pointer;
  transition: all 0.3s ease;
}

button:hover {
  background: #ffe6f0;
}

/* Mobile adjustments */
@media (max-width: 480px) {
  #message {
    width: 90%;
    font-size: 1rem;
  }

  button {
    width: 70%;
    font-size: 1rem;
    padding: 0.5rem;
  }
}
</style>
</head>

<body>

<h1>💌 A Message For You</h1>
<p id="message"></p>
<button onclick="goPage('page3.html')">Next Surprise 🎁</button>

<script>
var text = "You are the most special person in my life💖💫. Your love, care, and kindness make every moment beautiful😇✨. I am so lucky to have you in my life💯🥰😘🫂.";

var i = 0;

function typing() {
  if (i < text.length) {
    document.getElementById("message").innerHTML += text.charAt(i);
    i++;
    setTimeout(typing, 50);
  }
}

typing();

function goPage(page) {
  document.body.classList.add("fadeOut");
  setTimeout(() => {
    window.location.href = page;
  }, 600);
}
</script>

</body>
</html>
